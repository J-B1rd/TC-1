kind = "mobile"
previewPath = "/"
title = "Tradesman Toolkit"
version = "1.0.0"
id = "artifacts/construction-calc"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18549

[services.development]
run = "pnpm --filter @workspace/construction-calc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/construction-calc", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/construction-calc", "run", "serve" ]

[services.env]
PORT = "18549"
BASE_PATH = "/"
